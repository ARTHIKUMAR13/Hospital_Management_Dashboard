<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Billing – MedPlus HMS</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<div class="layout">
  <div id="sidebar-placeholder"></div>
  <div class="main">
    <div class="topbar">
      <div class="topbar-title">Billing</div>
      <div class="topbar-right">
        <button class="btn btn-primary" onclick="openAddModal()">+ New Bill</button>
        <div class="avatar">AD</div>
      </div>
    </div>
    <div class="content">
      <div class="stats-grid" id="billing-stats" style="margin-bottom:24px"></div>
      <div class="card">
        <div class="search-bar">
          <input type="text" id="search" placeholder="Search patient name…" oninput="renderTable()"/>
          <select id="filter-status" onchange="renderTable()">
            <option value="">All Status</option>
            <option>Paid</option><option>Pending</option>
          </select>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>#</th><th>Patient</th><th>Date</th><th>Service Type</th><th>Amount</th><th>Status</th><th>Actions</th></tr>
            </thead>
            <tbody id="billing-table"></tbody>
          </table>
        </div>
        <div id="empty-billing" class="empty-state" style="display:none">
          <div class="empty-icon">💳</div>
          <p>No bills found.</p>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="billing-modal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title">New Bill</h3>
      <button class="modal-close" onclick="closeModal('billing-modal')">✕</button>
    </div>
    <div class="form-grid">
      <input type="hidden" id="b-id"/>
      <div class="form-group">
        <label>Patient Name</label>
        <select id="b-patient"></select>
      </div>
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="b-date"/>
      </div>
      <div class="form-group">
        <label>Service Type</label>
        <select id="b-type">
          <option>OPD Consultation</option>
          <option>IPD Admission</option>
          <option>Surgery + Room</option>
          <option>Consultation + Tests</option>
          <option>Emergency</option>
          <option>Pharmacy</option>
          <option>Lab Tests</option>
        </select>
      </div>
      <div class="form-group">
        <label>Amount (₹)</label>
        <input type="number" id="b-amount" min="0" placeholder="0"/>
      </div>
      <div class="form-group">
        <label>Payment Status</label>
        <select id="b-status">
          <option>Paid</option><option>Pending</option>
        </select>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-outline" onclick="closeModal('billing-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveBill()">Save Bill</button>
    </div>
  </div>
</div>

<script src="../js/app.js"></script>
<script src="../js/sidebar.js"></script>
<script>
function renderStats() {
  const bills = DB.get('billing');
  const total = bills.reduce((s,b) => s + b.amount, 0);
  const paid = bills.filter(b=>b.status==='Paid').reduce((s,b) => s + b.amount, 0);
  const pending = bills.filter(b=>b.status==='Pending').reduce((s,b) => s + b.amount, 0);
  document.getElementById('billing-stats').innerHTML = `
    <div class="stat-card blue"><div class="stat-label">Total Billed</div><div class="stat-value">₹${total.toLocaleString('en-IN')}</div><div class="stat-sub">${bills.length} invoices</div></div>
    <div class="stat-card green"><div class="stat-label">Collected</div><div class="stat-value">₹${paid.toLocaleString('en-IN')}</div><div class="stat-sub">${bills.filter(b=>b.status==='Paid').length} paid</div></div>
    <div class="stat-card amber"><div class="stat-label">Pending</div><div class="stat-value">₹${pending.toLocaleString('en-IN')}</div><div class="stat-sub">${bills.filter(b=>b.status==='Pending').length} unpaid</div></div>
  `;
}

function renderTable() {
  const q = document.getElementById('search').value.toLowerCase();
  const st = document.getElementById('filter-status').value;
  let bills = DB.get('billing');
  if (q) bills = bills.filter(b => b.patientName.toLowerCase().includes(q));
  if (st) bills = bills.filter(b => b.status === st);
  document.getElementById('empty-billing').style.display = bills.length ? 'none' : 'block';
  document.getElementById('billing-table').innerHTML = bills.map(b => `
    <tr>
      <td style="color:var(--text3)">#${b.id}</td>
      <td>${b.patientName}</td>
      <td>${formatDate(b.date)}</td>
      <td><span class="badge badge-blue">${b.type}</span></td>
      <td><strong>₹${b.amount.toLocaleString('en-IN')}</strong></td>
      <td>${badgeHtml(b.status)}</td>
      <td style="display:flex;gap:6px">
        <button class="btn btn-outline btn-sm" onclick="editBill(${b.id})">Edit</button>
        <button class="btn btn-danger btn-sm" onclick="deleteBill(${b.id})">Delete</button>
      </td>
    </tr>`).join('');
}

function openAddModal() {
  document.getElementById('modal-title').textContent = 'New Bill';
  document.getElementById('b-id').value = '';
  document.getElementById('b-date').value = new Date().toISOString().split('T')[0];
  document.getElementById('b-amount').value = '';
  document.getElementById('b-status').value = 'Paid';
  const patients = DB.get('patients');
  document.getElementById('b-patient').innerHTML = patients.map(p=>`<option value="${p.name}">${p.name}</option>`).join('');
  openModal('billing-modal');
}

function saveBill() {
  const amount = +document.getElementById('b-amount').value;
  if (!amount) { alert('Amount is required'); return; }
  const id = document.getElementById('b-id').value;
  const bills = DB.get('billing');
  const obj = {
    id: id ? +id : DB.nextId('billing'),
    patientName: document.getElementById('b-patient').value,
    date: document.getElementById('b-date').value,
    type: document.getElementById('b-type').value,
    amount, status: document.getElementById('b-status').value,
  };
  if (id) { bills[bills.findIndex(b => b.id === +id)] = obj; showToast('Bill updated'); }
  else { bills.push(obj); showToast('Bill saved'); }
  DB.set('billing', bills);
  closeModal('billing-modal');
  renderTable();
  renderStats();
}

function editBill(id) {
  const b = DB.get('billing').find(b => b.id === id);
  document.getElementById('modal-title').textContent = 'Edit Bill';
  document.getElementById('b-id').value = b.id;
  const patients = DB.get('patients');
  document.getElementById('b-patient').innerHTML = patients.map(p=>`<option value="${p.name}"${p.name===b.patientName?' selected':''}>${p.name}</option>`).join('');
  document.getElementById('b-date').value = b.date;
  document.getElementById('b-type').value = b.type;
  document.getElementById('b-amount').value = b.amount;
  document.getElementById('b-status').value = b.status;
  openModal('billing-modal');
}

function deleteBill(id) {
  if (!confirm('Delete this bill?')) return;
  DB.set('billing', DB.get('billing').filter(b => b.id !== id));
  showToast('Bill deleted');
  renderTable();
  renderStats();
}

document.getElementById('billing-modal').addEventListener('click', e => { if(e.target===e.currentTarget) closeModal('billing-modal'); });
renderStats();
renderTable();
</script>
</body>
</html>
