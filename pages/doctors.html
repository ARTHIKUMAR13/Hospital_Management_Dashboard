<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Doctors – MedPlus HMS</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<div class="layout">
  <div id="sidebar-placeholder"></div>
  <div class="main">
    <div class="topbar">
      <div class="topbar-title">Doctors</div>
      <div class="topbar-right">
        <button class="btn btn-primary" onclick="openModal('doctor-modal')">+ Add Doctor</button>
        <div class="avatar">AD</div>
      </div>
    </div>
    <div class="content">
      <div class="card">
        <div class="search-bar">
          <input type="text" id="search" placeholder="Search by name or department…" oninput="renderTable()"/>
          <select id="filter-dept" onchange="renderTable()">
            <option value="">All Departments</option>
            <option>Cardiology</option><option>Orthopedics</option><option>Neurology</option>
            <option>Pediatrics</option><option>General Medicine</option><option>Dermatology</option>
          </select>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>#</th><th>Name</th><th>Department</th><th>Phone</th><th>Email</th><th>Experience</th><th>Status</th><th>Actions</th></tr>
            </thead>
            <tbody id="doctor-table"></tbody>
          </table>
        </div>
        <div id="empty-doctors" class="empty-state" style="display:none">
          <div class="empty-icon">👨‍⚕️</div>
          <p>No doctors found. Add one to get started.</p>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="doctor-modal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title">Add Doctor</h3>
      <button class="modal-close" onclick="closeModal('doctor-modal')">✕</button>
    </div>
    <div class="form-grid">
      <input type="hidden" id="d-id"/>
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="d-name" placeholder="Dr. Full Name"/>
      </div>
      <div class="form-group">
        <label>Department</label>
        <select id="d-dept">
          <option>Cardiology</option><option>Orthopedics</option><option>Neurology</option>
          <option>Pediatrics</option><option>General Medicine</option><option>Dermatology</option>
        </select>
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input type="text" id="d-phone" placeholder="10-digit number"/>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="d-email" placeholder="doctor@hospital.in"/>
      </div>
      <div class="form-group">
        <label>Experience</label>
        <input type="text" id="d-exp" placeholder="e.g. 8 years"/>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="d-status">
          <option>Available</option><option>On Leave</option><option>Off Duty</option>
        </select>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-outline" onclick="closeModal('doctor-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveDoctor()">Save Doctor</button>
    </div>
  </div>
</div>

<script src="../js/app.js"></script>
<script src="../js/sidebar.js"></script>
<script>
function renderTable() {
  const q = document.getElementById('search').value.toLowerCase();
  const dept = document.getElementById('filter-dept').value;
  let doctors = DB.get('doctors');
  if (q) doctors = doctors.filter(d => d.name.toLowerCase().includes(q) || d.dept.toLowerCase().includes(q));
  if (dept) doctors = doctors.filter(d => d.dept === dept);
  const tbody = document.getElementById('doctor-table');
  document.getElementById('empty-doctors').style.display = doctors.length ? 'none' : 'block';
  tbody.innerHTML = doctors.map(d => `
    <tr>
      <td style="color:var(--text3)">#${d.id}</td>
      <td>${d.name}</td>
      <td><span class="badge badge-blue">${d.dept}</span></td>
      <td>${d.phone}</td>
      <td style="color:var(--text2)">${d.email}</td>
      <td>${d.experience}</td>
      <td>${badgeHtml(d.status)}</td>
      <td style="display:flex;gap:6px">
        <button class="btn btn-outline btn-sm" onclick="editDoctor(${d.id})">Edit</button>
        <button class="btn btn-danger btn-sm" onclick="deleteDoctor(${d.id})">Delete</button>
      </td>
    </tr>`).join('');
}

function saveDoctor() {
  const name = document.getElementById('d-name').value.trim();
  if (!name) { alert('Name is required'); return; }
  const id = document.getElementById('d-id').value;
  const doctors = DB.get('doctors');
  const obj = {
    id: id ? +id : DB.nextId('doctors'),
    name, dept: document.getElementById('d-dept').value,
    phone: document.getElementById('d-phone').value,
    email: document.getElementById('d-email').value,
    experience: document.getElementById('d-exp').value,
    status: document.getElementById('d-status').value,
  };
  if (id) { doctors[doctors.findIndex(d => d.id === +id)] = obj; showToast('Doctor updated'); }
  else { doctors.push(obj); showToast('Doctor added'); }
  DB.set('doctors', doctors);
  closeModal('doctor-modal');
  renderTable();
}

function editDoctor(id) {
  const d = DB.get('doctors').find(d => d.id === id);
  document.getElementById('modal-title').textContent = 'Edit Doctor';
  document.getElementById('d-id').value = d.id;
  document.getElementById('d-name').value = d.name;
  document.getElementById('d-dept').value = d.dept;
  document.getElementById('d-phone').value = d.phone;
  document.getElementById('d-email').value = d.email;
  document.getElementById('d-exp').value = d.experience;
  document.getElementById('d-status').value = d.status;
  openModal('doctor-modal');
}

function deleteDoctor(id) {
  if (!confirm('Delete this doctor?')) return;
  DB.set('doctors', DB.get('doctors').filter(d => d.id !== id));
  showToast('Doctor deleted');
  renderTable();
}

document.getElementById('doctor-modal').addEventListener('click', e => { if(e.target===e.currentTarget) closeModal('doctor-modal'); });
renderTable();
</script>
</body>
</html>
